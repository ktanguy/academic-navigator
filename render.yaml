# Render Blueprint - Infrastructure as Code
# This file defines the services for deployment on Render.com

services:
  # Backend API Service (also serves frontend in production)
  - type: web
    name: academic-navigator-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CLASSIFIER_API_URL
        value: https://tkwizera-student-support-api.hf.space/classify
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
    healthCheckPath: /api/health
