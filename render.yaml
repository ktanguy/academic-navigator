# Render Blueprint - Infrastructure as Code
# This file defines the services for deployment on Render.com
# Note: Static sites should be created manually in Render dashboard

services:
  # Backend API Service (also serves frontend in production)
  - type: web
    name: academic-navigator-api
    runtime: python
    buildCommand: npm install && npm run build && cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CLASSIFIER_API_URL
        value: https://tkwizera-student-support-api.hf.space/classify
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
    healthCheckPath: /api/health
