# Nixpacks configuration for Railway deployment
[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = ["npm install", "cd backend && pip install -r requirements.txt"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT"
